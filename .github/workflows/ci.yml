name: CI Frontend

on:
  push:
    branches:
      - main
      - develop
      - 'desarrollo/**'
  pull_request:

jobs:
  lint-and-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (sin auto-fix)
        run: pnpm run lint:check

      - name: TypeCheck
        run: pnpm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    env:
      # Next.js necesita la variable en build time aunque no la use realmente
      NEXT_PUBLIC_PLATFORM_ROOT_DOMAIN: app.buildforge.work
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # next build valida tipos y rutas además de compilar
      - name: Build
        run: pnpm run build

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Falla el job si hay vulnerabilidades high o critical
      - name: Audit dependencies
        run: pnpm audit --audit-level=high
